name: Daily AI Digest

on:
  schedule:
    # Once daily at 1:00 PM UTC = 7:00 AM Mountain Time
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore article database
        uses: actions/cache@v4
        with:
          path: data/articles.db
          key: articles-db-${{ github.run_number }}
          restore-keys: |
            articles-db-

      - name: Create directories
        run: mkdir -p data logs

      - name: Run digest pipeline
        env:
          ULTRAPLAN_GMAIL_USER: ${{ secrets.ULTRAPLAN_GMAIL_USER }}
          ULTRAPLAN_GMAIL_APP_PASSWORD: ${{ secrets.ULTRAPLAN_GMAIL_APP_PASSWORD }}
          ULTRAPLAN_EMAIL: ${{ secrets.ULTRAPLAN_EMAIL }}
          ULTRAPLAN_DELIVERY: email
        run: python -m src.main

      - name: Commit scored articles for ideas trigger
        run: |
          git config user.name "UltraPlan Bot"
          git config user.email "bot@ultraplan.local"
          if [ -f data/latest_digest.json ]; then
            git add data/latest_digest.json
            git commit -m "data: scored articles $(date +%Y-%m-%d)" || true
            git push || true
          fi
