name: Daily AI Digest

on:
  schedule:
    # 6:00 AM Mountain Time (MDT) = 12:00 PM UTC
    - cron: '0 12 * * *'
    # 6:00 PM Mountain Time (MDT) = 00:00 UTC next day
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore article database
        uses: actions/cache@v4
        with:
          path: data/articles.db
          key: articles-db-${{ github.run_number }}
          restore-keys: |
            articles-db-

      - name: Create directories
        run: mkdir -p data logs

      - name: Run digest pipeline
        env:
          ULTRAPLAN_GMAIL_USER: ${{ secrets.ULTRAPLAN_GMAIL_USER }}
          ULTRAPLAN_GMAIL_APP_PASSWORD: ${{ secrets.ULTRAPLAN_GMAIL_APP_PASSWORD }}
          ULTRAPLAN_EMAIL: ${{ secrets.ULTRAPLAN_EMAIL }}
          ULTRAPLAN_PHONE: ""
          ULTRAPLAN_NTFY_TOPIC: ${{ secrets.ULTRAPLAN_NTFY_TOPIC }}
          ULTRAPLAN_DELIVERY: both
        run: python -m src.main
